<div *ngIf="course; else notFound">

  <h2>{{ course.name }}</h2>

  <p>
    <strong>Course ID:</strong>
    {{ course.id }}
  </p>

  <p>
    <strong>Instructor:</strong>
    {{ course.instructor }}
  </p>

  <p>
    <strong>Duration:</strong>
    {{ course.duration }}
  </p>

</div>

<ng-template #notFound>

  <h2>Course Not Found</h2>

  <p>No course exists with this ID.</p>

</ng-template>
