<div
class="card"

appHighlight="lightblue"

[ngClass]="cardClasses"

[ngStyle]="{'border-left':'8px solid '+borderColor}">

<h2>{{course.name}}</h2>

<p>
<strong>Trainer:</strong>
{{course.trainer}}
</p>

<p>
<strong>Credits:</strong>
{{course.credits | creditLabel}}
</p>

<p>
<strong>Enrolled:</strong>

{{course.enrolled ? 'Yes' : 'No'}}

</p>

<div [ngSwitch]="course.gradeStatus">

<span
*ngSwitchCase="'passed'"
class="badge passed">

Passed

</span>

<span
*ngSwitchCase="'failed'"
class="badge failed">

Failed

</span>

<span
*ngSwitchDefault
class="badge pending">

Pending

</span>

</div>

<button (click)="toggleDetails()">

{{isExpanded ? 'Hide Details' : 'Show Details'}}

</button>

<div *ngIf="isExpanded">

<hr>

<p>

This is additional course information.

</p>

</div>

</div>
