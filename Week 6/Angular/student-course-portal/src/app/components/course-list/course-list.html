<h1>Student Course Portal</h1>

<p *ngIf="isLoading">
    Loading courses...
</p>

<ng-container *ngIf="!isLoading">

<div *ngIf="courses.length>0;else noCourses" class="course-grid">

<app-course-card

*ngFor="let course of courses;trackBy:trackByCourseId"

[course]="course">

</app-course-card>

</div>

</ng-container>

<ng-template #noCourses>

<p>No Courses Available.</p>

</ng-template>
